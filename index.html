<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce 3D Pro - Visor AR</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-gray: #f5f5f7;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--apple-gray);
            color: #1d1d1f;
            padding-bottom: 50px;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #d2d2d7;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }

        /* Tarjeta de Producto */
        .card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .card { grid-template-columns: 1fr 1fr; }
        }

        /* Visor 3D */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #fbfbfb;
            border-radius: 18px;
            overflow: hidden;
        }

        /* Botón Ver en AR (solo aparece en móviles) */
        #ar-button {
            background-color: white;
            border-radius: 8px;
            border: 1px solid #d2d2d7;
            padding: 10px 20px;
            font-weight: 600;
            color: var(--apple-blue);
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: none; /* Model-viewer lo muestra si hay AR */
        }

        /* Panel de Información */
        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .price { font-size: 24px; font-weight: 600; color: #1d1d1f; margin-bottom: 10px; }
        .description { color: #6e6e73; line-height: 1.4; margin-bottom: 20px; }

        .btn-buy {
            background-color: var(--apple-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Sección del QR (solo para desktop) */
        #qr-section {
            margin-top: 30px;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed #d2d2d7;
        }

        @media (max-width: 768px) {
            #qr-section { display: none; } /* Ocultar en móvil */
        }

        #qrcode { margin-top: 15px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <h2>Tienda de Objetos 3D</h2>
    </header>

    <div class="container">
        <div class="card">
            <model-viewer 
                src="MiObjeto3D.glb" 
                ios-src="MiObjeto3D.usdz"
                ar 
                ar-modes="webxr scene-viewer quick-look" 
                camera-controls 
                auto-rotate 
                shadow-intensity="1">
                
                <button slot="ar-button" id="ar-button">
                    👋 Ver en tu espacio (AR)
                </button>
            </model-viewer>

            <div class="info">
                <span style="color: #bf4800; font-weight: 600; font-size: 12px; text-transform: uppercase;">Nuevo</span>
                <h1 style="margin: 5px 0;">Prototipo Escaneado</h1>
                <p class="price">19,99 €</p>
                <p class="description">
                    Este objeto ha sido generado mediante fotogrametría. Escanea el código QR desde tu iPhone o Android para colocarlo en tu habitación.
                </p>
                <button class="btn-buy" onclick="alert('¡Añadido!')">Añadir a la bolsa</button>
            </div>
        </div>

        <div id="qr-section">
            <p style="margin: 0; font-weight: 600;">¿Quieres probar la Realidad Aumentada?</p>
            <p style="margin: 5px 0; font-size: 14px; color: #6e6e73;">Escanea este código con tu móvil:</p>
            <div id="qrcode"></div>
            <p id="current-url" style="font-size: 10px; color: #aeaeb2; margin-top: 10px;"></p>
        </div>
    </div>

    <script>
        // Lógica para generar el QR basado en la URL que estés usando en el Mac
        window.onload = function() {
            var url = window.location.href;
            
            // Si la URL es localhost, avisamos al usuario
            if (url.includes("localhost") || url.includes("127.0.0.1")) {
                document.getElementById("current-url").innerText = "⚠️ ESTÁS USANDO LOCALHOST. Usa la IP de tu Mac para que el móvil pueda entrar.";
                document.getElementById("current-url").style.color = "red";
            } else {
                document.getElementById("current-url").innerText = "URL detectada: " + url;
            }

            // Crear el código QR
            new QRCode(document.getElementById("qrcode"), {
                text: url,
                width: 140,
                height: 140,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
